site_name: claude-code-toolkit
site_url: https://sepehrn0107.github.io/claude-code-toolkit/
repo_url: https://github.com/sepehrn0107/claude-code-toolkit
repo_name: sepehrn0107/claude-code-toolkit
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  logo: ../logo.svg
  favicon: ../logo.svg

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Getting Started:
    - Install: getting-started/install.md
    - First Session: getting-started/first-session.md
    - Core Concepts: getting-started/concepts.md
  - User Guide:
    - Memory: user-guide/memory.md
    - Routing: user-guide/routing.md
    - Standards: user-guide/standards.md
    - Working Across Projects: user-guide/multi-project.md
    - Optional Setup: user-guide/optional-setup.md
  - Skills Reference:
    - All Skills: skills/README.md
    - Lifecycle Skills: skills/lifecycle.md
    - Memory Skills: skills/memory-skills.md
    - Code Tool Skills: skills/code-tools.md
    - Upgrade Skills: skills/upgrade.md
  - Standards Reference:
    - Overview: standards/README.md
    - Universal Standards: standards/universal.md
    - Stack Standards: standards/stacks.md
  - Tools Reference:
    - Python Tools: tools/README.md
  - Contributing:
    - Overview: contributing/overview.md
    - Adding a Skill: contributing/adding-a-skill.md
    - Adding Standards: contributing/adding-standards.md
    - Upgrade Migrations: contributing/upgrade-migrations.md
    - Writing Documentation: contributing/documentation.md
